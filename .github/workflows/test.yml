name: Test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Run package tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install latest Jik release
        if: runner.os == 'Linux'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          release_dir="$RUNNER_TEMP/jik-release"
          extract_dir="$RUNNER_TEMP/jik-extract"
          mkdir -p "$release_dir" "$extract_dir"

          gh release download --repo jik-lang/jik --pattern '*' --dir "$release_dir" --clobber

          asset="$(
            find "$release_dir" -maxdepth 1 -type f \
              | grep -Ei 'linux|ubuntu' \
              | grep -Ei 'x86_64|amd64|x64' \
              | head -n 1 \
              || true
          )"

          if [ -z "$asset" ]; then
            asset="$(
              find "$release_dir" -maxdepth 1 -type f \
                | grep -Ei 'linux|ubuntu' \
                | head -n 1 \
                || true
            )"
          fi

          if [ -z "$asset" ]; then
            echo "::error::Latest jik-lang/jik release has no Linux release asset."
            find "$release_dir" -maxdepth 1 -type f -print
            exit 1
          fi

          case "$asset" in
            *.tar.gz|*.tgz)
              tar -xzf "$asset" -C "$extract_dir"
              ;;
            *.tar.xz)
              tar -xJf "$asset" -C "$extract_dir"
              ;;
            *.zip)
              unzip -q "$asset" -d "$extract_dir"
              ;;
            *)
              echo "::error::Unsupported Jik release asset format: $asset"
              exit 1
              ;;
          esac

          jik_bin="$(find "$extract_dir" -type f -name jik -perm -u=x | head -n 1)"
          if [ -z "$jik_bin" ]; then
            echo "::error::Downloaded Jik release asset does not contain an executable named 'jik'."
            find "$extract_dir" -maxdepth 4 -type f -print
            exit 1
          fi

          echo "$(dirname "$jik_bin")" >> "$GITHUB_PATH"

      - name: Install latest Jik release
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'

          $releaseDir = Join-Path $env:RUNNER_TEMP 'jik-release'
          $extractDir = Join-Path $env:RUNNER_TEMP 'jik-extract'
          New-Item -ItemType Directory -Force -Path $releaseDir, $extractDir | Out-Null

          gh release download --repo jik-lang/jik --pattern '*' --dir $releaseDir --clobber

          $assets = Get-ChildItem -Path $releaseDir -File
          $asset = $assets | Where-Object {
            $_.Name -match 'windows|win' -and $_.Name -match 'x86_64|amd64|x64'
          } | Select-Object -First 1

          if (-not $asset) {
            $asset = $assets | Where-Object { $_.Name -match 'windows|win' } | Select-Object -First 1
          }

          if (-not $asset) {
            Write-Error 'Latest jik-lang/jik release has no Windows release asset.'
            $assets | Select-Object -ExpandProperty FullName
            exit 1
          }

          switch -Regex ($asset.Name) {
            '\.zip$' { Expand-Archive -Path $asset.FullName -DestinationPath $extractDir -Force }
            default { Write-Error "Unsupported Jik release asset format: $($asset.Name)"; exit 1 }
          }

          $jikBin = Get-ChildItem -Path $extractDir -Recurse -File -Filter 'jik.exe' | Select-Object -First 1
          if (-not $jikBin) {
            Write-Error "Downloaded Jik release asset does not contain an executable named 'jik.exe'."
            Get-ChildItem -Path $extractDir -Recurse -File | Select-Object -ExpandProperty FullName
            exit 1
          }

          Split-Path -Parent $jikBin.FullName | Add-Content -Path $env:GITHUB_PATH

      - name: Install MinGW-w64 GCC
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc

      - name: Check Jik version
        run: jik version

      - name: Run tests
        if: runner.os == 'Linux'
        run: jik run test/tests.jik

      - name: Run tests
        if: runner.os == 'Windows'
        shell: msys2 {0}
        env:
          JIK_CC: gcc
        run: jik run test/tests.jik
